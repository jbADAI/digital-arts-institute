# config/rss-feeds.yaml
# Curated RSS feeds for the A(DAI) intelligence pipeline.
# Read by scripts/rss_reader.py
#
# Each feed has:
#   name:     Display name for provenance tracking
#   url:      RSS/Atom feed URL
#   tier:     1 = core field publications, 2 = broader arts/tech with filtering
#   tags:     Which categories this source primarily covers
#
# Last verified: 2026-03-09
# Notes on dead/blocked sources at bottom of file.

feeds:

  # ── Tier 1: Core digital arts publications ──────────────────────────────────

  - name: Creative Applications Network
    url: https://www.creativeapplications.net/feed/
    tier: 1
    tags: [generative_algorithmic, immersive_experiential, robotic_machine]
    notes: "Code-based art, creative technology projects"

  - name: We Make Money Not Art
    url: https://we-make-money-not-art.com/feed/rss/
    tier: 1
    tags: [robotic_machine, immersive_experiential, hybrid_postdigital]
    notes: "Critical coverage of art+tech intersections"

  - name: Neural Magazine
    url: https://neural.it/feed/
    tier: 1
    tags: [generative_algorithmic, networked_web, live_performance]
    notes: "New media art and electronic music"

  - name: TOPLAP (Live Coding)
    url: https://toplap.org/feed/
    tier: 1
    tags: [live_performance]
    notes: "Live coding community — Algorave, TidalCycles, etc."

  - name: Processing Foundation
    url: https://medium.com/feed/processing-foundation
    tier: 1
    tags: [generative_algorithmic]
    notes: "Processing and p5.js ecosystem"

  # ── Tier 1: Institutional ────────────────────────────────────────────────────

  - name: Ars Electronica
    url: https://ars.electronica.art/feed/
    tier: 1
    tags: [generative_algorithmic, immersive_experiential, robotic_machine, hybrid_postdigital]
    notes: "Major digital arts festival and research centre"

  - name: V&A Blog
    url: https://www.vam.ac.uk/blog/feed
    tier: 1
    tags: [hybrid_postdigital, generative_algorithmic]
    notes: "V&A digital design and new media coverage"

  - name: Serpentine Galleries
    url: https://www.serpentinegalleries.org/feed
    tier: 1
    tags: [immersive_experiential, hybrid_postdigital, generative_algorithmic]
    notes: "R&D programme — AI, futures, digital commissions"

  # ── Tier 1: Community and ecosystem ──────────────────────────────────────────

  - name: fxhash
    url: https://fxhash.substack.com/feed
    tier: 1
    tags: [generative_algorithmic, networked_web]
    notes: "On-chain generative art platform — Substack feed"

  - name: Eyeo Festival
    url: https://vimeo.com/eyeofestival/videos/rss
    tier: 1
    tags: [generative_algorithmic, live_performance, hybrid_postdigital]
    notes: "Creative code conference talks"

  - name: ISEA Symposium
    url: https://isea-archives.org/feed/
    tier: 1
    tags: [generative_algorithmic, immersive_experiential, robotic_machine]
    notes: "International symposium on electronic art"

  # ── Tier 2: Broader arts/tech — keyword filter essential ─────────────────────

  - name: Hyperallergic
    url: https://hyperallergic.com/feed/
    tier: 2
    tags: [hybrid_postdigital, generative_algorithmic, networked_web]
    notes: "General contemporary art — filter for digital coverage"

  - name: Dezeen
    url: https://www.dezeen.com/feed/
    tier: 2
    tags: [immersive_experiential, hybrid_postdigital, robotic_machine]
    notes: "Design/architecture — filter for interactive and digital"

  - name: The Art Newspaper
    url: https://www.theartnewspaper.com/rss.xml
    tier: 2
    tags: [hybrid_postdigital, networked_web]
    notes: "Broad art news — filter for digital/NFT/media art"

  - name: Artforum
    url: https://www.artforum.com/feed/
    tier: 2
    tags: [hybrid_postdigital, generative_algorithmic]
    notes: "Critical art writing — filter for new media coverage"

  - name: Wired
    url: https://www.wired.com/feed/
    tier: 2
    tags: [generative_algorithmic, robotic_machine, hybrid_postdigital]
    notes: "Tech culture — filter for art-focused pieces only"

