# config/keyword-filters.yaml
# Keyword filtering for the A(DAI) RSS reader and scout agent.
# Based on the A(DAI) definition of the Digital Arts field.
#
# Logic:
#   1. If any `exclude` term matches → skip
#   2. If no `required_any` term matches → skip
#   3. Score against `categories` → accept if matched_categories >= threshold

threshold: 1  # minimum number of categories that must match

# ── Exclusions ────────────────────────────────────────────────────────────────
# Terms that indicate the signal is NOT about digital art practice,
# regardless of other keyword matches.
exclude:
  - digital marketing
  - digital transformation
  - digital banking
  - digital payments
  - digital currency
  - cryptocurrency trading
  - crypto trading
  - nft trading
  - nft investment
  - nft market cap
  - floor price
  - token price
  - digital health
  - digital therapeutics
  - digital twin (engineering)
  - digital signage
  - programmatic advertising
  - social media marketing
  - growth hacking
  - influencer marketing
  - seo
  - saas
  - b2b software
  - enterprise software
  - press release
  - sponsored content

# ── Required gate ─────────────────────────────────────────────────────────────
# At least ONE of these must appear for the signal to be considered.
# Broad enough to catch the field; narrow enough to filter general tech news.
required_any:
  # Field identity
  - digital art
  - digital arts
  - new media art
  - new media
  - media art
  - electronic art
  - computer art
  - software art
  - computational art
  - code art
  - creative coding
  - creative technolog

  # Practice terms
  - generative art
  - algorithmic art
  - interactive art
  - immersive art
  - net art
  - internet art
  - web art
  - live coding
  - audiovisual
  - data art
  - data visuali
  - robotic art
  - kinetic art
  - post-digital
  - hybrid art

  # Tools & platforms (highly specific to the field)
  - processing sketch
  - p5.js
  - openframeworks
  - touchdesigner
  - max/msp
  - supercollider
  - tidalcycles
  - sonic pi
  - algorave
  - art blocks
  - fxhash
  - toplap

  # Institutional signals
  - ars electronica
  - zkm
  - rhizome
  - eyeo
  - isea
  - siggraph art

# ── Categories ────────────────────────────────────────────────────────────────
# The six pillars of the Digital Arts field.
# Used to tag signals and score relevance.

