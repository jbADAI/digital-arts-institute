<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>graph — A(DAI)</title>
  <meta name="description" content="The A(DAI) knowledge graph — a living map of concepts, practitioners, and threads across the digital arts field.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Syne:wght@400;500;600;700;800&family=Syne+Mono&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg:#FFFFFF;--ink:#1A1A1A;--mint:#7aff9c;--sage:#c2dbbf;--sky:#85b0e1;
      --muted:#444444;--faint:#DDDDDD;--rule:rgba(0,0,0,0.06);
    }
    *{margin:0;padding:0;box-sizing:border-box;}
    ::selection{background:var(--mint);color:#0C0F0E;}
    html,body{width:100%;height:100%;background:var(--bg);overflow:hidden;-webkit-font-smoothing:antialiased;}
    body::after{content:'';position:fixed;inset:0;z-index:1;pointer-events:none;
      background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
      opacity:0.045;}

    /* CANVAS */
    #graphCanvas{position:fixed;inset:0;z-index:0;cursor:grab;}
    #graphCanvas.dragging{cursor:grabbing;}

    /* NAV OVERLAY */
    .nav-overlay{position:fixed;top:0;left:0;right:0;z-index:30;padding:2rem 3.2rem;
      display:flex;justify-content:space-between;align-items:flex-start;pointer-events:none;}
    .nav-left,.nav-right{pointer-events:all;}
    .brand{text-decoration:none;display:flex;align-items:baseline;gap:1rem;}
    .brand-mark{font-family:'Instrument Serif',Georgia,serif;font-size:clamp(1.4rem,3vw,2rem);
      font-weight:400;line-height:1;letter-spacing:-0.03em;color:var(--ink);}
    .brand-mark .paren{color:var(--mint);font-style:italic;}
    .breadcrumb{font-family:'Syne Mono',monospace;font-size:0.58rem;letter-spacing:0.18em;
      color:var(--muted);text-transform:uppercase;display:flex;align-items:center;gap:0.5rem;}
    .breadcrumb .sep{color:var(--mint);}
    .nav-back{font-family:'Syne',sans-serif;font-size:0.62rem;font-weight:500;letter-spacing:0.18em;
      color:var(--muted);text-decoration:none;text-transform:uppercase;transition:color 0.25s;}
    .nav-back:hover{color:var(--mint);}

    /* FILTER BAR */
    .stats-bar{position:fixed;bottom:0;left:0;right:0;z-index:30;padding:0.9rem 3.2rem;
      display:flex;justify-content:space-between;align-items:center;
      background:rgba(255,255,255,0.92);backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);
      border-top:1px solid var(--rule);pointer-events:all;gap:1rem;}
    .filter-chips{display:flex;gap:0.4rem;align-items:center;flex-wrap:wrap;}
    .fchip{font-family:'Syne Mono',monospace;font-size:0.52rem;letter-spacing:0.1em;
      color:var(--muted);text-transform:uppercase;border:1px solid var(--faint);background:var(--bg);
      padding:0.25rem 0.6rem;cursor:pointer;transition:all 0.2s;user-select:none;}
    .fchip:hover{border-color:var(--muted);}
    .fchip.active{border-color:var(--ink);color:var(--ink);}
    .fchip.fc-all.active{border-color:var(--mint);color:var(--mint);}
    .fchip.fc-concept.active{background:rgba(122,255,156,0.12);border-color:#7aff9c;color:var(--ink);}
    .fchip.fc-practitioner.active{background:rgba(133,176,225,0.12);border-color:#85b0e1;color:var(--ink);}
    .fchip.fc-scene.active{background:rgba(194,219,191,0.12);border-color:#c2dbbf;color:var(--ink);}
    .fchip.fc-thread.active{background:rgba(68,68,68,0.08);border-color:#888;color:var(--ink);}
    .filter-counts{font-family:'Syne Mono',monospace;font-size:0.5rem;letter-spacing:0.1em;
      color:#AAAAAA;white-space:nowrap;}

    /* DETAIL PANEL */
    .detail-panel{position:fixed;top:0;right:0;bottom:0;z-index:40;width:300px;
      background:#fff;border-left:1px solid var(--rule);
      transform:translateX(100%);transition:transform 0.45s cubic-bezier(0.16,1,0.3,1);
      display:flex;flex-direction:column;overflow:hidden;pointer-events:all;}
    .detail-panel.open{transform:translateX(0);}
    .dp-header{display:flex;justify-content:space-between;align-items:flex-start;
      padding:1.4rem 1.4rem 0.6rem;border-bottom:1px solid var(--rule);flex-shrink:0;}
    .dp-type{font-family:'Syne Mono',monospace;font-size:0.48rem;letter-spacing:0.22em;
      color:var(--mint);text-transform:uppercase;}
    .dp-close{background:none;border:none;font-family:'Syne Mono',monospace;font-size:0.9rem;
      color:#CCCCCC;cursor:pointer;padding:0;line-height:1;transition:color 0.2s;}
    .dp-close:hover{color:var(--ink);}
    .dp-body{flex:1;overflow-y:auto;padding:1rem 1.4rem 0;}
    .dp-name{font-family:'Instrument Serif',Georgia,serif;font-size:1.5rem;font-weight:400;
      letter-spacing:-0.01em;color:var(--ink);line-height:1.2;margin-bottom:0.35rem;}
    .dp-count{font-family:'Syne Mono',monospace;font-size:0.52rem;letter-spacing:0.12em;
      color:var(--muted);text-transform:uppercase;margin-bottom:1rem;}
    .dp-section{margin-bottom:1.2rem;}
    .dp-section-label{font-family:'Syne Mono',monospace;font-size:0.48rem;letter-spacing:0.2em;
      color:#AAAAAA;text-transform:uppercase;margin-bottom:0.5rem;}
    .dp-chips{display:flex;flex-wrap:wrap;gap:0.3rem;}
    .dp-chip{font-family:'Syne Mono',monospace;font-size:0.5rem;letter-spacing:0.06em;
      color:var(--muted);border:1px solid var(--faint);padding:0.2rem 0.5rem;cursor:pointer;
      transition:all 0.15s;text-transform:uppercase;}
    .dp-chip:hover{border-color:var(--mint);color:var(--mint);}
    .dp-signal-item{border-top:1px solid var(--rule);padding:0.6rem 0;cursor:pointer;}
    .dp-signal-item:first-child{border-top:none;}
    .dp-signal-title{font-family:'Syne',sans-serif;font-size:0.62rem;color:var(--ink);
      line-height:1.5;transition:color 0.15s;}
    .dp-signal-item:hover .dp-signal-title{color:var(--mint);}
    .dp-signal-meta{font-family:'Syne Mono',monospace;font-size:0.48rem;letter-spacing:0.08em;
      color:#AAAAAA;text-transform:uppercase;margin-top:0.2rem;}
    .dp-thread-text{font-family:'Instrument Serif',Georgia,serif;font-style:italic;
      font-size:0.88rem;color:var(--muted);line-height:1.6;}
    .dp-skills{flex-shrink:0;border-top:1px solid var(--rule);padding:0.9rem 1.4rem;display:flex;gap:0.8rem;flex-wrap:wrap;}
    .dp-skill-link{font-family:'Syne Mono',monospace;font-size:0.54rem;letter-spacing:0.1em;
      color:var(--muted);text-decoration:none;text-transform:uppercase;
      transition:color 0.2s;display:flex;align-items:center;gap:0.3rem;}
    .dp-skill-link:hover{color:var(--mint);}
    .dp-skill-link .arr{color:var(--mint);}

    /* HOVER TOOLTIP */
    .tooltip{position:fixed;z-index:50;pointer-events:none;opacity:0;
      transition:opacity 0.15s;padding:1rem 1.2rem;background:white;
      border:1px solid var(--rule);box-shadow:0 4px 20px rgba(0,0,0,0.06);max-width:320px;}
    .tooltip.visible{opacity:1;}
    .tooltip-type{font-family:'Syne Mono',monospace;font-size:0.48rem;letter-spacing:0.2em;
      color:var(--mint);text-transform:uppercase;margin-bottom:0.3rem;}
    .tooltip-name{font-family:'Instrument Serif',Georgia,serif;font-size:1.05rem;font-weight:400;
      color:var(--ink);margin-bottom:0.3rem;letter-spacing:-0.01em;}
    .tooltip-meta{font-family:'Syne Mono',monospace;font-size:0.5rem;color:var(--muted);
      letter-spacing:0.08em;}
    .tooltip-connections{font-family:'Syne',sans-serif;font-size:0.6rem;color:#AAAAAA;
      margin-top:0.4rem;line-height:1.6;}
    .tooltip-hint{font-family:'Syne Mono',monospace;font-size:0.46rem;color:#CCCCCC;
      margin-top:0.5rem;letter-spacing:0.1em;text-transform:uppercase;}

    /* CONTROLS */
    .controls{position:fixed;top:50%;right:2.5rem;z-index:30;transform:translateY(-50%);
      display:flex;flex-direction:column;gap:0.4rem;pointer-events:all;}
    .ctrl-btn{width:32px;height:32px;border:1px solid var(--rule);background:rgba(255,255,255,0.9);
      backdrop-filter:blur(6px);display:flex;align-items:center;justify-content:center;
      cursor:pointer;font-family:'Syne Mono',monospace;font-size:0.7rem;color:var(--muted);
      transition:border-color 0.2s,color 0.2s;}
    .ctrl-btn:hover{border-color:var(--mint);color:var(--mint);}

    /* LOADING */
    .loading-overlay{position:fixed;inset:0;z-index:100;background:var(--bg);display:flex;
      align-items:center;justify-content:center;transition:opacity 0.6s;}
    .loading-overlay.hidden{opacity:0;pointer-events:none;}
    .loading-text{font-family:'Syne Mono',monospace;font-size:0.62rem;letter-spacing:0.14em;
      color:var(--muted);text-transform:uppercase;}
    .loading-dot{display:inline-block;width:5px;height:5px;border-radius:50%;background:var(--mint);
      margin-left:0.4rem;animation:pulse 1.2s ease-in-out infinite;}

    /* SEARCH OVERLAY */
    .search-overlay{position:fixed;top:5.5rem;left:50%;transform:translateX(-50%);z-index:35;
      pointer-events:all;opacity:0;animation:arrive 0.6s cubic-bezier(0.16,1,0.3,1) 0.3s forwards;}
    .search-box{display:flex;align-items:center;border:1px solid var(--faint);background:rgba(255,255,255,0.95);
      backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);transition:border-color 0.2s;
      width:320px;max-width:80vw;}
    .search-box:focus-within{border-color:var(--mint);}
    .search-prefix{font-family:'Syne Mono',monospace;font-size:0.8rem;color:var(--mint);
      padding:0 0 0 0.8rem;line-height:1;user-select:none;}
    .search-input{flex:1;border:none;outline:none;padding:0.65rem 0.8rem;
      font-family:'Syne Mono',monospace;font-size:0.68rem;color:var(--ink);
      background:transparent;letter-spacing:0.04em;}
    .search-input::placeholder{color:#CCCCCC;}

    @keyframes arrive{from{opacity:0;transform:translateX(-50%) translateY(8px);}to{opacity:1;transform:translateX(-50%) translateY(0);}}
    @keyframes pulse{0%,100%{opacity:1}50%{opacity:0.3}}

    @media(max-width:700px){
      .nav-overlay{padding:1.2rem 1.4rem;}
      .stats-bar{padding:0.8rem 1.4rem;flex-direction:column;gap:0.5rem;}
      .stats-left{gap:1rem;}
      .controls{right:1rem;}
      .search-overlay{top:4.5rem;}
    }
  </style>
</head>
<body>

<canvas id="graphCanvas"></canvas>

<!-- LOADING -->
<div class="loading-overlay" id="loading">
  <span class="loading-text">initializing field intelligence</span><span class="loading-dot"></span>
</div>

<!-- NAV -->
<div class="nav-overlay">
  <div class="nav-left">
    <a href="/" class="brand">
      <div class="brand-mark">A<span class="paren">(</span>DAI<span class="paren">)</span></div>
      <div class="breadcrumb"><span class="sep">/</span><span>graph</span></div>
    </a>
  </div>
  <div class="nav-right" style="display:flex;gap:1.5rem;align-items:center;">
    <a href="field-intelligence.html" class="nav-back">/query →</a>
  </div>
</div>

<!-- SEARCH -->
<div class="search-overlay">
  <div class="search-box">
    <div class="search-prefix">&#x203A;</div>
    <input type="text" class="search-input" id="searchInput" placeholder="Find a concept..." autocomplete="off">
  </div>
</div>

<!-- ZOOM CONTROLS -->
<div class="controls">
  <div class="ctrl-btn" id="zoomIn">+</div>
  <div class="ctrl-btn" id="zoomOut">&minus;</div>
  <div class="ctrl-btn" id="zoomFit" title="Fit to screen">&#x25CB;</div>
</div>

<!-- TOOLTIP -->
<div class="tooltip" id="tooltip"></div>

<!-- FILTER BAR -->
<div class="stats-bar">
  <div class="filter-chips">
    <div class="fchip fc-all active" data-filter="all">[all]</div>
    <div class="fchip fc-concept active" data-filter="concept">[concepts]</div>
    <div class="fchip fc-practitioner active" data-filter="practitioner">[practitioners]</div>
    <div class="fchip fc-scene active" data-filter="scene">[scenes]</div>
    <div class="fchip fc-thread active" data-filter="thread">[threads]</div>
  </div>
  <div class="filter-counts" id="filterCounts"></div>
</div>

<!-- DETAIL PANEL -->
<div class="detail-panel" id="detailPanel">
  <div class="dp-header">
    <span class="dp-type" id="dpType">concept</span>
    <button class="dp-close" id="dpClose">×</button>
  </div>
  <div class="dp-body">
    <div class="dp-name" id="dpName"></div>
    <div class="dp-count" id="dpCount"></div>
    <div id="dpContent"></div>
  </div>
  <div class="dp-skills" id="dpSkills"></div>
</div>

<script>
(function(){
  // ── CONFIG ──
  var NODE_COLORS = {
    concept:'#7aff9c', practitioner:'#85b0e1', scene:'#c2dbbf', thread:'#444444'
  };
  var NODE_HOVER_COLORS = {
    concept:'#5de07a', practitioner:'#6a9ad4', scene:'#a3c9a0', thread:'#222222'
  };
  var EDGE_COLOR = 'rgba(0,0,0,0.04)';
  var EDGE_HOVER_COLOR = 'rgba(122,255,156,0.35)';
  var LABEL_FONT = '500 9px Syne,sans-serif';
  var LABEL_HOVER_FONT = '600 10px Syne,sans-serif';
  var MIN_NODE_R = 3;
  var MAX_NODE_R = 18;
  var DAMPING = 0.82;
  var REPULSION = 500;
  var SPRING_K = 0.004;
  var SPRING_LENGTH = 90;
  var GRAVITY = 0.008;

  // ── STATE ──
  var canvas = document.getElementById('graphCanvas');
  var ctx = canvas.getContext('2d');
  var nodes = [], edges = [], nodeMap = {};
  var hoveredNode = null, highlightSet = null;
  var searchMatch = null;
  var nearbySet = null; // nodes spatially close to hovered node
  var graphData = null;
  var signalMap = {};
  var hiddenTypes = new Set(); // types currently hidden by filter

  // Camera
  var cam = {x:0, y:0, zoom:1};
  var dragging = false, dragStart = {x:0, y:0}, camStart = {x:0, y:0};

  // ── CANVAS RESIZE ──
  function resize(){
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
  }
  window.addEventListener('resize', resize);
  resize();

  // ── LOAD DATA ──
  fetch('graph-data.json').then(function(r){return r.json();}).then(function(data){
    graphData = data;
    buildGraph(data);
    document.getElementById('loading').classList.add('hidden');
    simulate();
  }).catch(function(e){
    document.getElementById('loading').innerHTML =
      '<span class="loading-text" style="color:#e85555;">Error: '+e.message+'</span>';
  });

  // ── BUILD GRAPH ──
  function buildGraph(data){
    var typeMap = {'Concept':'concept','Practitioner':'practitioner','Scene':'scene','Thread':'thread'};
    var maxCount = 1;

    // Find max signal_count for sizing
    (data.nodes||[]).forEach(function(d){
      if((d.signal_count||0) > maxCount) maxCount = d.signal_count;
    });

    // Add all nodes
    (data.nodes||[]).forEach(function(d){
      var type = typeMap[d.type] || d.type.toLowerCase();
      var count = d.signal_count || 0;
      var label = d.label || d.id;
      var r;
      if(type === 'concept')       r = MIN_NODE_R + (count / maxCount) * (MAX_NODE_R - MIN_NODE_R);
      else if(type === 'practitioner') r = MIN_NODE_R + (count / maxCount) * (MAX_NODE_R*0.7 - MIN_NODE_R);
      else if(type === 'scene')    r = MIN_NODE_R + 4;
      else                         r = MIN_NODE_R + 3;

      var n = {
        id: d.id, type: type, label: label.length>40 ? label.slice(0,40)+'...' : label,
        fullLabel: label, count: count, r: r,
        x: (Math.random()-0.5)*600, y: (Math.random()-0.5)*600,
        vx:0, vy:0, connections:[], signals: d.signals || []
      };
      nodes.push(n);
      nodeMap[d.id.toLowerCase()] = n;
      // Also map by label for search
      if(d.label) nodeMap[d.label.toLowerCase()] = n;
    });

    // Build edges
    (data.edges||[]).forEach(function(e){
      var sNode = nodeMap[e.source.toLowerCase()];
      var tNode = nodeMap[e.target.toLowerCase()];
      if(sNode && tNode){
        var edge = {source:sNode, target:tNode, weight:e.weight||1};
        edges.push(edge);
        sNode.connections.push(tNode);
        tNode.connections.push(sNode);
      }
    });

    // Assign breathing phase index
    nodes.forEach(function(n,i){ n._idx = i; });

    // Stats
    updateFilterCounts();

    // Centre camera
    cam.x = 0; cam.y = 0;
    cam.zoom = Math.min(canvas.width, canvas.height) / 1200;
  }

  // ── FORCE SIMULATION ──
  var simRunning = true, simCool = 0.6;

  function simulate(){
    if(!simRunning) return;
    step();
    draw();
    requestAnimationFrame(simulate);
  }

  function step(){
    var N = nodes.length;
    if(simCool < 0.001) return;

    // Repulsion (Barnes-Hut would be better for large N, but 300 nodes is fine with O(n^2))
    for(var i=0;i<N;i++){
      for(var j=i+1;j<N;j++){
        var dx=nodes[j].x-nodes[i].x, dy=nodes[j].y-nodes[i].y;
        var d2=dx*dx+dy*dy;
        if(d2<1)d2=1;
        var d=Math.sqrt(d2);
        var f=REPULSION*simCool/d2;
        var fx=dx/d*f, fy=dy/d*f;
        nodes[i].vx-=fx; nodes[i].vy-=fy;
        nodes[j].vx+=fx; nodes[j].vy+=fy;
      }
    }

    // Spring attraction along edges
    edges.forEach(function(e){
      var dx=e.target.x-e.source.x, dy=e.target.y-e.source.y;
      var d=Math.sqrt(dx*dx+dy*dy)||1;
      var f=SPRING_K*(d-SPRING_LENGTH)*simCool;
      var w=Math.min(e.weight,5)/5; // weight factor
      f*=(0.5+w*0.5);
      var fx=dx/d*f, fy=dy/d*f;
      e.source.vx+=fx; e.source.vy+=fy;
      e.target.vx-=fx; e.target.vy-=fy;
    });

    // Gravity toward centre
    nodes.forEach(function(n){
      n.vx-=n.x*GRAVITY*simCool;
      n.vy-=n.y*GRAVITY*simCool;
    });

    // Apply velocity
    nodes.forEach(function(n){
      n.vx*=DAMPING;
      n.vy*=DAMPING;
      n.x+=n.vx;
      n.y+=n.vy;
    });

    simCool*=0.9985;
  }

  // ── DRAW ──
  var drawTime = 0;
  function draw(){
    drawTime = performance.now() * 0.001;
    var W=canvas.width, H=canvas.height;
    ctx.clearRect(0,0,W,H);
    ctx.save();
    ctx.translate(W/2+cam.x, H/2+cam.y);
    ctx.scale(cam.zoom, cam.zoom);

    // Edges
    edges.forEach(function(e){
      if(hiddenTypes.has(e.source.type) || hiddenTypes.has(e.target.type)) return;
      var highlighted = highlightSet && (highlightSet.has(e.source) && highlightSet.has(e.target));
      var dimmed = highlightSet && !highlighted;
      var isSearch = searchMatch && (searchMatch===e.source || searchMatch===e.target);

      ctx.beginPath();
      ctx.moveTo(e.source.x, e.source.y);
      ctx.lineTo(e.target.x, e.target.y);

      if(highlighted || isSearch){
        ctx.strokeStyle = EDGE_HOVER_COLOR;
        ctx.lineWidth = Math.max(1, Math.min(e.weight, 5) * 0.6) / cam.zoom;
      } else {
        ctx.strokeStyle = dimmed ? 'rgba(0,0,0,0.01)' : EDGE_COLOR;
        ctx.lineWidth = Math.max(0.5, Math.min(e.weight, 5) * 0.3) / cam.zoom;
      }
      ctx.stroke();
    });

    // Nodes
    nodes.forEach(function(n){
      if(hiddenTypes.has(n.type)) return;
      var isHover = n === hoveredNode;
      var isHighlight = highlightSet && highlightSet.has(n);
      var isSearch = searchMatch === n;
      var isNearby = nearbySet && nearbySet.has(n);
      var dimmed = highlightSet && !isHighlight && !isSearch && !isNearby;

      // Breathing: subtle radius oscillation per node
      var breathPhase = (n._idx || 0) * 1.618;
      var breath = 1 + Math.sin(drawTime * 0.8 + breathPhase) * 0.12 + Math.sin(drawTime * 1.3 + breathPhase * 0.7) * 0.06;
      var r = n.r * (isHover ? 1.3 : breath);
      var alpha = dimmed ? 0.08 : isNearby ? 0.7 : 1;

      // Glow for hovered or searched
      if(isHover || isSearch){
        var g = ctx.createRadialGradient(n.x,n.y,r,n.x,n.y,r*3);
        g.addColorStop(0, n.type==='concept'?'rgba(122,255,156,0.25)':
          n.type==='practitioner'?'rgba(133,176,225,0.25)':
          n.type==='scene'?'rgba(194,219,191,0.25)':'rgba(68,68,68,0.15)');
        g.addColorStop(1,'rgba(0,0,0,0)');
        ctx.beginPath();ctx.arc(n.x,n.y,r*3,0,Math.PI*2);
        ctx.fillStyle=g;ctx.fill();
      }

      // Nearby node ring (spatial proximity reaction)
      if(isNearby && hoveredNode){
        var dx=n.x-hoveredNode.x, dy=n.y-hoveredNode.y;
        var dist=Math.sqrt(dx*dx+dy*dy);
        var prox=1-Math.min(dist/120,1); // 1=very close, 0=far
        ctx.beginPath();ctx.arc(n.x,n.y,r+3+prox*4,0,Math.PI*2);
        ctx.strokeStyle='rgba(122,255,156,'+(prox*0.3).toFixed(2)+')';
        ctx.lineWidth=1/cam.zoom;
        ctx.stroke();
      }

      // Node circle
      ctx.beginPath();ctx.arc(n.x,n.y,r,0,Math.PI*2);
      ctx.globalAlpha = alpha;
      ctx.fillStyle = isHover ? (NODE_HOVER_COLORS[n.type]||'#333') : (NODE_COLORS[n.type]||'#AAAAAA');
      ctx.fill();
      ctx.globalAlpha = 1;

      // Label (only show on hover, highlight, or search — hidden by default)
      if(isHover || isHighlight || isSearch){
        var fontSize = isHover ? 11 : 9;
        ctx.font = (isHover?'600 ':'500 ') + fontSize/cam.zoom + 'px Syne,sans-serif';
        ctx.textAlign = 'center';
        ctx.globalAlpha = dimmed ? 0.1 : isHover ? 1 : 0.9;
        ctx.fillStyle = isHover ? '#1A1A1A' : '#333333';

        var lbl = n.label;
        if(!isHover && lbl.length>20) lbl = lbl.slice(0,18)+'..';
        ctx.fillText(lbl, n.x, n.y + r + 12/cam.zoom);
        ctx.globalAlpha = 1;
      }
    });

    ctx.restore();
  }

  // ── COORDINATE TRANSFORMS ──
  function screenToWorld(sx, sy){
    return {
      x: (sx - canvas.width/2 - cam.x) / cam.zoom,
      y: (sy - canvas.height/2 - cam.y) / cam.zoom
    };
  }

  function hitTest(sx, sy){
    var w = screenToWorld(sx, sy);
    var best = null, bestD2 = Infinity;
    nodes.forEach(function(n){
      if(hiddenTypes.has(n.type)) return;
      var dx = w.x - n.x, dy = w.y - n.y;
      var hitR = Math.max(n.r, 10) + 4/cam.zoom;
      var d2 = dx*dx + dy*dy;
      if(d2 < hitR*hitR && d2 < bestD2){
        bestD2 = d2;
        best = n;
      }
    });
    return best;
  }

  // ── TOOLTIP ──
  var tooltip = document.getElementById('tooltip');

  function showTooltip(n, sx, sy){
    var connCount = n.connections.length;
    var sigCount = (n.signals||[]).length;
    var connNames = n.connections.slice(0,5).map(function(c){return c.label;}).join(', ');
    if(n.connections.length > 5) connNames += ' + '+(n.connections.length-5)+' more';

    var html = '<div class="tooltip-type">' + n.type + '</div>';
    html += '<div class="tooltip-name">' + (n.fullLabel || n.label) + '</div>';
    html += '<div class="tooltip-meta">' + n.count + ' signal' + (n.count!==1?'s':'');
    html += ' &middot; ' + connCount + ' connection' + (connCount!==1?'s':'') + '</div>';
    if(connNames) html += '<div class="tooltip-connections">' + connNames + '</div>';
    html += '<div class="tooltip-hint">Click to explore</div>';

    tooltip.innerHTML = html;
    tooltip.classList.add('visible');

    // Position
    var tx = sx + 16, ty = sy - 10;
    if(tx + 330 > window.innerWidth) tx = sx - 330;
    if(ty + 180 > window.innerHeight) ty = sy - 180;
    if(ty < 10) ty = 10;
    tooltip.style.left = tx + 'px';
    tooltip.style.top = ty + 'px';
  }

  function hideTooltip(){
    tooltip.classList.remove('visible');
  }

  // ── MOUSE INTERACTION ──
  canvas.addEventListener('mousedown', function(e){
    dragging = true;
    dragStart.x = e.clientX;
    dragStart.y = e.clientY;
    camStart.x = cam.x;
    camStart.y = cam.y;
    canvas.classList.add('dragging');
  });

  window.addEventListener('mousemove', function(e){
    if(dragging){
      cam.x = camStart.x + (e.clientX - dragStart.x);
      cam.y = camStart.y + (e.clientY - dragStart.y);
      hideTooltip();
      draw();
      return;
    }
    var n = hitTest(e.clientX, e.clientY);
    if(n !== hoveredNode){
      hoveredNode = n;
      if(n){
        highlightSet = new Set([n].concat(n.connections));
        // Find spatially nearby nodes (within 120px world-space)
        nearbySet = new Set();
        var PROX = 120;
        nodes.forEach(function(o){
          if(o===n) return;
          var dx=o.x-n.x, dy=o.y-n.y;
          if(dx*dx+dy*dy < PROX*PROX) nearbySet.add(o);
        });
        // Gently push nearby nodes away from hovered node
        nearbySet.forEach(function(o){
          var dx=o.x-n.x, dy=o.y-n.y;
          var d=Math.sqrt(dx*dx+dy*dy)||1;
          var push=1.2;
          o.vx+=dx/d*push;
          o.vy+=dy/d*push;
        });
        canvas.style.cursor = 'pointer';
        showTooltip(n, e.clientX, e.clientY);
      } else {
        highlightSet = null;
        nearbySet = null;
        canvas.style.cursor = 'grab';
        hideTooltip();
      }
      draw();
    } else if(n){
      // Update tooltip position
      showTooltip(n, e.clientX, e.clientY);
      // Continuous gentle push on nearby nodes
      if(nearbySet){
        nearbySet.forEach(function(o){
          var dx=o.x-n.x, dy=o.y-n.y;
          var d=Math.sqrt(dx*dx+dy*dy)||1;
          o.vx+=dx/d*0.3;
          o.vy+=dy/d*0.3;
        });
      }
    }
  });

  window.addEventListener('mouseup', function(e){
    if(dragging){
      var moved = Math.abs(e.clientX - dragStart.x) + Math.abs(e.clientY - dragStart.y);
      dragging = false;
      canvas.classList.remove('dragging');

      // If barely moved, treat as click
      if(moved < 5){
        var n = hitTest(e.clientX, e.clientY);
        if(n){
          openPanel(n);
        } else {
          closePanel();
        }
      }
    }
  });

  // Zoom
  canvas.addEventListener('wheel', function(e){
    e.preventDefault();
    var factor = e.deltaY > 0 ? 0.92 : 1.08;
    var oldZoom = cam.zoom;
    cam.zoom *= factor;
    cam.zoom = Math.max(0.1, Math.min(cam.zoom, 5));

    // Zoom toward mouse position
    var mx = e.clientX - canvas.width/2;
    var my = e.clientY - canvas.height/2;
    cam.x = mx - (mx - cam.x) * (cam.zoom / oldZoom);
    cam.y = my - (my - cam.y) * (cam.zoom / oldZoom);

    draw();
  }, {passive:false});

  // Touch support
  var lastTouchDist = 0;
  canvas.addEventListener('touchstart', function(e){
    if(e.touches.length === 1){
      dragging = true;
      dragStart.x = e.touches[0].clientX;
      dragStart.y = e.touches[0].clientY;
      camStart.x = cam.x;
      camStart.y = cam.y;
    } else if(e.touches.length === 2){
      var dx = e.touches[0].clientX - e.touches[1].clientX;
      var dy = e.touches[0].clientY - e.touches[1].clientY;
      lastTouchDist = Math.sqrt(dx*dx+dy*dy);
    }
    e.preventDefault();
  }, {passive:false});

  canvas.addEventListener('touchmove', function(e){
    if(e.touches.length === 1 && dragging){
      cam.x = camStart.x + (e.touches[0].clientX - dragStart.x);
      cam.y = camStart.y + (e.touches[0].clientY - dragStart.y);
      draw();
    } else if(e.touches.length === 2){
      var dx = e.touches[0].clientX - e.touches[1].clientX;
      var dy = e.touches[0].clientY - e.touches[1].clientY;
      var dist = Math.sqrt(dx*dx+dy*dy);
      if(lastTouchDist > 0){
        cam.zoom *= dist / lastTouchDist;
        cam.zoom = Math.max(0.1, Math.min(cam.zoom, 5));
      }
      lastTouchDist = dist;
      draw();
    }
    e.preventDefault();
  }, {passive:false});

  canvas.addEventListener('touchend', function(){
    dragging = false;
    lastTouchDist = 0;
  });

  // ── ZOOM CONTROLS ──
  document.getElementById('zoomIn').addEventListener('click', function(){
    cam.zoom = Math.min(cam.zoom * 1.3, 5);
    draw();
  });
  document.getElementById('zoomOut').addEventListener('click', function(){
    cam.zoom = Math.max(cam.zoom * 0.7, 0.1);
    draw();
  });
  document.getElementById('zoomFit').addEventListener('click', function(){
    cam.x = 0; cam.y = 0;
    // Calculate bounds
    var minX=Infinity,maxX=-Infinity,minY=Infinity,maxY=-Infinity;
    nodes.forEach(function(n){
      if(n.x<minX)minX=n.x;if(n.x>maxX)maxX=n.x;
      if(n.y<minY)minY=n.y;if(n.y>maxY)maxY=n.y;
    });
    var gw=maxX-minX+100, gh=maxY-minY+100;
    cam.zoom = Math.min(canvas.width/gw, canvas.height/gh) * 0.85;
    cam.x = -(minX+maxX)/2 * cam.zoom;
    cam.y = -(minY+maxY)/2 * cam.zoom;
    draw();
  });

  // ── SEARCH ──
  var searchInput = document.getElementById('searchInput');
  var searchTimer = null;

  searchInput.addEventListener('input', function(){
    clearTimeout(searchTimer);
    searchTimer = setTimeout(function(){
      var q = searchInput.value.toLowerCase().trim();
      if(!q){
        searchMatch = null;
        highlightSet = null;
        draw();
        return;
      }
      // Find best match
      var best = null, bestScore = 0;
      nodes.forEach(function(n){
        var name = (n.fullLabel||n.label).toLowerCase();
        var score = 0;
        if(name === q) score = 100;
        else if(name.indexOf(q) === 0) score = 60;
        else if(name.indexOf(q) >= 0) score = 30;
        if(score > bestScore){ bestScore = score; best = n; }
      });

      if(best){
        searchMatch = best;
        highlightSet = new Set([best].concat(best.connections));
        // Pan camera to node
        cam.x = -best.x * cam.zoom;
        cam.y = -best.y * cam.zoom;
        if(cam.zoom < 0.5) cam.zoom = 0.8;
      } else {
        searchMatch = null;
        highlightSet = null;
      }
      draw();
    }, 200);
  });

  // Keyboard shortcut: / to focus search
  window.addEventListener('keydown', function(e){
    if(e.key === '/' && document.activeElement !== searchInput){
      e.preventDefault();
      searchInput.focus();
    }
    if(e.key === 'Escape'){
      searchInput.blur();
      searchInput.value = '';
      searchMatch = null;
      highlightSet = null;
      hoveredNode = null;
      closePanel();
      draw();
    }
  });

  // ── FILTER COUNTS ──
  function updateFilterCounts(){
    var counts = {concept:0, practitioner:0, scene:0, thread:0};
    nodes.forEach(function(n){ if(counts[n.type]!==undefined) counts[n.type]++; });
    var el = document.getElementById('filterCounts');
    if(el) el.textContent = counts.concept+' · '+counts.practitioner+' · '+counts.scene+' · '+counts.thread;
  }

  // ── FILTER CHIPS ──
  document.querySelectorAll('.fchip').forEach(function(chip){
    chip.addEventListener('click', function(){
      var f = chip.getAttribute('data-filter');
      if(f === 'all'){
        // Toggle all: if any hidden, show all; else hide nothing matters — reset
        hiddenTypes.clear();
        document.querySelectorAll('.fchip').forEach(function(c){ c.classList.add('active'); });
      } else {
        // Toggle this type
        document.querySelector('.fchip.fc-all').classList.remove('active');
        if(hiddenTypes.has(f)){
          hiddenTypes.delete(f);
          chip.classList.add('active');
          // If all types now visible, re-activate [all]
          if(hiddenTypes.size === 0) document.querySelector('.fchip.fc-all').classList.add('active');
        } else {
          hiddenTypes.add(f);
          chip.classList.remove('active');
        }
      }
      // Clear hover/highlight state for hidden nodes
      if(hoveredNode && hiddenTypes.has(hoveredNode.type)){
        hoveredNode = null; highlightSet = null; nearbySet = null;
        hideTooltip();
      }
      draw();
    });
  });

  // ── DETAIL PANEL ──
  var panel = document.getElementById('detailPanel');
  var dpClose = document.getElementById('dpClose');
  dpClose.addEventListener('click', closePanel);

  function closePanel(){
    panel.classList.remove('open');
  }

  function openPanel(n){
    document.getElementById('dpType').textContent = n.type;
    document.getElementById('dpName').textContent = n.fullLabel || n.label;
    var countStr = n.count + ' signal' + (n.count !== 1 ? 's' : '');
    if(n.connections && n.connections.length){
      countStr += ' · ' + n.connections.length + ' connection' + (n.connections.length!==1?'s':'');
    }
    document.getElementById('dpCount').textContent = countStr;

    var content = '';
    var signals = (n.signals || []).slice(0, 8);

    if(n.type === 'concept'){
      // Co-occurring concepts
      var coNodes = n.connections.filter(function(c){ return c.type==='concept'; }).slice(0,12);
      if(coNodes.length){
        content += '<div class="dp-section"><div class="dp-section-label">co-occurring concepts</div>';
        content += '<div class="dp-chips">';
        coNodes.forEach(function(c){
          content += '<span class="dp-chip" data-navnode="'+escHtml(c.id)+'">'+escHtml(c.label)+'</span>';
        });
        content += '</div></div>';
      }
    }

    if(n.type === 'thread'){
      content += '<div class="dp-section"><div class="dp-thread-text">'+escHtml(n.fullLabel||n.label)+'</div></div>';
    }

    if(signals.length && graphData){
      content += '<div class="dp-section"><div class="dp-section-label">signals</div>';
      signals.forEach(function(sid){
        var s = signalMap[sid];
        if(!s) return;
        content += '<div class="dp-signal-item">';
        content += '<div class="dp-signal-title">'+escHtml(s.title)+'</div>';
        content += '<div class="dp-signal-meta">'+escHtml(s.quality||'')+(s.date?' · '+s.date:'')+'</div>';
        content += '</div>';
      });
      content += '</div>';
    }

    document.getElementById('dpContent').innerHTML = content;

    // Wire chip navigation
    document.querySelectorAll('#dpContent .dp-chip[data-navnode]').forEach(function(chip){
      chip.addEventListener('click', function(){
        var key = chip.getAttribute('data-navnode').toLowerCase();
        var target = nodeMap[key];
        if(target){
          openPanel(target);
          // Pan to node
          cam.x = -target.x * cam.zoom;
          cam.y = -target.y * cam.zoom;
          highlightSet = new Set([target].concat(target.connections));
          draw();
        }
      });
    });

    // Skills row
    var queryUrl = 'field-intelligence.html#' + encodeURIComponent(n.type+'::'+n.id);
    var skillsHtml = '<a class="dp-skill-link" href="'+queryUrl+'"><span class="arr">→</span>/query</a>';
    skillsHtml += '<a class="dp-skill-link" href="https://transcriber-ruddy.vercel.app" target="_blank"><span class="arr">→</span>/contribute</a>';
    document.getElementById('dpSkills').innerHTML = skillsHtml;

    panel.classList.add('open');
  }

  function escHtml(s){
    return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

})();
</script>
</body>
