<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>query — A(DAI)</title>
  <meta name="description" content="Talk to the A(DAI) collective intelligence engine. Sensemaking for the digital arts field.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Syne:wght@400;500;600;700;800&family=Syne+Mono&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg:#FFFFFF;--ink:#1A1A1A;--mint:#7aff9c;--sage:#c2dbbf;--sky:#85b0e1;
      --muted:#333333;--faint:#CCCCCC;--rule:rgba(0,0,0,0.08);
    }
    *{margin:0;padding:0;box-sizing:border-box;}
    ::selection{background:var(--mint);color:#0C0F0E;}
    html{width:100%;min-height:100%;background:var(--bg);-webkit-font-smoothing:antialiased;}
    body{width:100%;height:100vh;background:var(--bg);display:flex;flex-direction:column;}
    body::after{content:'';position:fixed;inset:0;z-index:1;pointer-events:none;
      background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
      opacity:0.045;}

    /* NAV */
    .nav-bar{position:sticky;top:0;z-index:40;padding:2rem 3.2rem;display:flex;
      justify-content:space-between;align-items:center;background:rgba(255,255,255,0.92);
      backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);border-bottom:1px solid var(--rule);flex-shrink:0;}
    .brand{text-decoration:none;display:flex;align-items:baseline;gap:1rem;}
    .brand-mark{font-family:'Instrument Serif',Georgia,serif;font-size:clamp(1.4rem,3vw,2rem);
      font-weight:400;line-height:1;letter-spacing:-0.03em;color:var(--ink);}
    .brand-mark .paren{color:var(--mint);font-style:italic;}
    .breadcrumb{font-family:'Syne Mono',monospace;font-size:0.72rem;letter-spacing:0.18em;
      color:var(--muted);text-transform:uppercase;display:flex;align-items:center;gap:0.5rem;}
    .breadcrumb .sep{color:var(--mint);}
    .nav-back{font-family:'Syne',sans-serif;font-size:0.75rem;font-weight:500;letter-spacing:0.18em;
      color:var(--muted);text-decoration:none;text-transform:uppercase;transition:color 0.25s;}
    .nav-back:hover{color:var(--mint);}

    /* LAYOUT */
    .main{position:relative;z-index:2;flex:1;display:flex;flex-direction:column;
      max-width:720px;width:100%;margin:0 auto;padding:0 3.2rem;}

    /* HEADER */
    .header{padding:1.8rem 0 1rem;flex-shrink:0;opacity:0;animation:arrive 1s cubic-bezier(0.16,1,0.3,1) 0.1s forwards;}
    .header-title{font-family:'Instrument Serif',Georgia,serif;font-size:clamp(1.1rem,2.5vw,1.4rem);
      color:var(--ink);line-height:1.3;margin-bottom:0.4rem;}
    .header-stats{font-family:'Syne Mono',monospace;font-size:0.68rem;letter-spacing:0.06em;
      color:#999999;line-height:1.6;}
    .header-stats .g{color:var(--mint);}

    /* MESSAGES */
    .messages{flex:1;overflow-y:auto;padding:0.5rem 0 1rem;display:flex;flex-direction:column;gap:1.2rem;
      opacity:0;animation:arrive 1s cubic-bezier(0.16,1,0.3,1) 0.2s forwards;position:relative;}
    .msg{max-width:88%;line-height:1.75;}
    .msg-user{align-self:flex-end;font-family:'Syne',sans-serif;font-size:0.85rem;color:var(--ink);
      background:rgba(122,255,156,0.08);border:1px solid rgba(122,255,156,0.18);
      padding:0.7rem 1rem;border-radius:2px;}
    .msg-assistant{align-self:flex-start;font-family:'Syne',sans-serif;font-size:0.85rem;
      color:var(--muted);padding:0.7rem 0;border-left:1.5px solid var(--sage);padding-left:1rem;}
    .msg-system{align-self:center;font-family:'Syne Mono',monospace;font-size:0.68rem;
      color:#999999;letter-spacing:0.08em;text-align:center;padding:0.5rem 0;}
    .msg-thinking{align-self:flex-start;font-family:'Syne Mono',monospace;font-size:0.72rem;
      color:#999999;letter-spacing:0.08em;animation:pulse 1.4s ease-in-out infinite;}

    /* INPUT */
    .input-area{flex-shrink:0;padding:1rem 0 2rem;border-top:1px solid var(--rule);
      display:flex;gap:0.8rem;align-items:flex-end;
      opacity:0;animation:arrive 1s cubic-bezier(0.16,1,0.3,1) 0.3s forwards;}
    .input-prefix{font-family:'Syne Mono',monospace;font-size:1rem;color:var(--mint);
      line-height:2.2;user-select:none;flex-shrink:0;}
    .input-field{flex:1;font-family:'Syne',sans-serif;font-size:0.88rem;color:var(--ink);
      background:transparent;border:none;border-bottom:1px solid var(--faint);outline:none;
      padding:0.5rem 0;line-height:1.6;resize:none;transition:border-color 0.2s;}
    .input-field:focus{border-bottom-color:var(--mint);}
    .input-field::placeholder{color:#BBBBBB;}
    .input-btn{font-family:'Syne Mono',monospace;font-size:0.68rem;letter-spacing:0.14em;
      color:var(--muted);background:none;border:1px solid var(--faint);padding:0.5rem 1rem;
      cursor:pointer;text-transform:uppercase;transition:all 0.2s;white-space:nowrap;}
    .input-btn:hover{border-color:var(--mint);color:var(--mint);}
    .input-btn:disabled{opacity:0.3;cursor:default;}

    /* FOOTER */
    .footer{flex-shrink:0;padding:0 0 1.5rem;display:flex;justify-content:space-between;align-items:center;}
    .footer-link{font-family:'Syne Mono',monospace;font-size:0.6rem;letter-spacing:0.14em;
      color:#AAAAAA;text-decoration:none;text-transform:uppercase;transition:color 0.2s;}
    .footer-link:hover{color:var(--mint);}

    /* FLOATING PROMPTS */
    .prompts-layer{position:absolute;inset:0;pointer-events:none;overflow:hidden;
      transition:opacity 0.6s ease;}
    .prompts-layer.hidden{opacity:0;pointer-events:none !important;}
    .prompt-pill{position:absolute;pointer-events:auto;cursor:pointer;
      font-family:'Syne Mono',monospace;font-size:0.7rem;letter-spacing:0.04em;
      color:#999999;border:1px solid var(--rule);padding:0.55rem 1rem;
      background:rgba(255,255,255,0.7);backdrop-filter:blur(6px);
      transition:border-color 0.3s, color 0.3s, transform 0.3s;
      max-width:70%;opacity:0;animation-fill-mode:forwards;}
    .prompt-pill:hover{border-color:var(--mint);color:var(--ink);transform:scale(1.03);}

    @keyframes arrive{from{opacity:0;transform:translateY(12px);}to{opacity:1;transform:translateY(0);}}
    @keyframes pulse{0%,100%{opacity:1}50%{opacity:0.3}}
    @keyframes drift0{0%,100%{transform:translate(0,0)}25%{transform:translate(12px,-8px)}50%{transform:translate(-6px,-14px)}75%{transform:translate(-10px,6px)}}
    @keyframes drift1{0%,100%{transform:translate(0,0)}25%{transform:translate(-14px,10px)}50%{transform:translate(8px,16px)}75%{transform:translate(16px,-6px)}}
    @keyframes drift2{0%,100%{transform:translate(0,0)}25%{transform:translate(10px,12px)}50%{transform:translate(-12px,4px)}75%{transform:translate(6px,-12px)}}
    @keyframes drift3{0%,100%{transform:translate(0,0)}25%{transform:translate(-8px,-14px)}50%{transform:translate(14px,-4px)}75%{transform:translate(-4px,10px)}}
    @keyframes drift4{0%,100%{transform:translate(0,0)}25%{transform:translate(6px,8px)}50%{transform:translate(-10px,-10px)}75%{transform:translate(12px,4px)}}
    @keyframes pillIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}

    @media(max-width:700px){
      .nav-bar{padding:1.2rem 1.6rem;}
      .main{padding:0 1.6rem;}
      .msg{max-width:95%;}
      .prompt-pill{font-size:0.62rem;padding:0.45rem 0.8rem;}
    }
  </style>
</head>
<body>

<!-- NAV -->
<div class="nav-bar">
  <a href="/" class="brand">
    <div class="brand-mark">A<span class="paren">(</span>DAI<span class="paren">)</span></div>
    <div class="breadcrumb"><span class="sep">/</span><span>query</span></div>
  </a>
  <a href="graph.html" class="nav-back">/graph &#8599;</a>
</div>

<!-- MAIN -->
<div class="main">

  <div class="header">
    <div class="header-title">Query the field</div>
    <div class="header-stats" id="graphStats">loading graph&hellip;</div>
  </div>

  <div class="messages" id="messages">
    <div class="prompts-layer" id="promptsLayer"></div>
  </div>

  <div class="input-area">
    <span class="input-prefix">&gt;</span>
    <textarea class="input-field" id="input" rows="1" placeholder="ask the graph something&hellip;" disabled></textarea>
    <button class="input-btn" id="sendBtn" disabled>send</button>
  </div>

  <div class="footer">
    <a href="drop-link.html" class="footer-link">drop a signal</a>
    <a href="/" class="footer-link">home</a>
  </div>

</div>

<script>
(function() {
  var messagesEl = document.getElementById('messages');
  var inputEl = document.getElementById('input');
  var sendBtn = document.getElementById('sendBtn');
  var statsEl = document.getElementById('graphStats');

  var graphSummary = '';
  var history = [];
  var working = false;

  // ── Load graph data ──────────────────────────────────────────
  fetch('graph-data.json')
    .then(function(r) { return r.json(); })
    .then(function(data) {
      var nodes = data.nodes || [];
      var edges = data.edges || [];
      var meta = data.meta || {};

      var concepts = nodes.filter(function(n) { return n.type === 'concept'; });
      var practitioners = nodes.filter(function(n) { return n.type === 'practitioner'; });
      var signals = nodes.filter(function(n) { return n.type === 'signal'; });
      var scenes = nodes.filter(function(n) { return n.type === 'scene'; });

      // Stats line
      statsEl.innerHTML = '<span class="g">&rarr;</span> ' +
        signals.length + ' signals, ' +
        concepts.length + ' concepts, ' +
        practitioners.length + ' practitioners, ' +
        scenes.length + ' scenes, ' +
        edges.length + ' connections';

      // Build compact summary for Claude
      var topConcepts = concepts
        .sort(function(a, b) { return (b.signal_count || 0) - (a.signal_count || 0); })
        .slice(0, 15)
        .map(function(n) { return n.label + ' (' + (n.signal_count || 0) + ')'; });

      var topPractitioners = practitioners
        .sort(function(a, b) { return (b.signal_count || 0) - (a.signal_count || 0); })
        .slice(0, 10)
        .map(function(n) { return n.label; });

      var recentSignals = signals.slice(-5).map(function(n) { return n.label; });

      graphSummary = 'Graph: ' + nodes.length + ' nodes, ' + edges.length + ' edges.\n' +
        'Signals: ' + signals.length + '. Concepts: ' + concepts.length +
        '. Practitioners: ' + practitioners.length + '. Scenes: ' + scenes.length + '.\n' +
        'Top concepts: ' + topConcepts.join(', ') + '.\n' +
        'Top practitioners: ' + topPractitioners.join(', ') + '.\n' +
        'Recent signals: ' + recentSignals.join('; ') + '.';

      inputEl.disabled = false;
      sendBtn.disabled = false;
      inputEl.focus();

      addMessage('system', signals.length + ' signals in the graph. ask anything.');

      // ── Floating prompt suggestions ──
      buildPrompts(concepts, practitioners);
    })
    .catch(function() {
      statsEl.textContent = 'graph not available';
      graphSummary = 'No graph data available yet.';
      inputEl.disabled = false;
      sendBtn.disabled = false;
      addMessage('system', 'graph not loaded \u2014 responses will be general.');
    });

  // ── Messages ─────────────────────────────────────────────────
  function addMessage(role, text) {
    var div = document.createElement('div');
    div.className = 'msg msg-' + role;
    div.textContent = text;
    messagesEl.appendChild(div);
    messagesEl.scrollTop = messagesEl.scrollHeight;
    return div;
  }

  // ── Floating prompts ─────────────────────────────────────
  var promptsLayer = document.getElementById('promptsLayer');

  var editorialQs = [
    "What's missing from this graph?",
    "Where is the field moving that institutions haven't caught up with?",
    "What blind spots does this data reveal?",
    "Who is underrepresented here?"
  ];

  var positions = [
    { top: '14%', left: '2%' },
    { top: '28%', left: '35%' },
    { top: '42%', left: '3%' },
    { top: '55%', left: '28%' },
    { top: '72%', left: '6%' },
    { top: '18%', left: '50%' }
  ];

  function buildPrompts(concepts, practitioners) {
    var questions = [];
    if (concepts.length > 0) {
      questions.push('Where does ' + concepts[0].label + ' show up and where is it absent?');
    }
    if (practitioners.length > 0) {
      questions.push('What connects ' + practitioners[0].label + ' to the wider field?');
    }
    var shuffled = editorialQs.sort(function() { return Math.random() - 0.5; });
    for (var i = 0; i < shuffled.length && questions.length < 6; i++) {
      questions.push(shuffled[i]);
    }
    questions.forEach(function(q, idx) {
      var pill = document.createElement('div');
      pill.className = 'prompt-pill';
      pill.textContent = q;
      pill.style.top = positions[idx % positions.length].top;
      pill.style.left = positions[idx % positions.length].left;
      pill.style.animation = 'pillIn 0.6s ease ' + (0.4 + idx * 0.15) + 's forwards, drift' + (idx % 5) + ' ' + (20 + idx * 3) + 's ease-in-out ' + (0.4 + idx * 0.15) + 's infinite';
      pill.addEventListener('click', function() {
        inputEl.value = q;
        send();
      });
      promptsLayer.appendChild(pill);
    });
  }

  function hidePrompts() {
    if (promptsLayer) promptsLayer.classList.add('hidden');
  }

  // ── Send ─────────────────────────────────────────────────────
  function send() {
    if (working) return;
    var text = inputEl.value.trim();
    if (!text) return;

    hidePrompts();
    addMessage('user', text);
    inputEl.value = '';
    autoResize();

    working = true;
    inputEl.disabled = true;
    sendBtn.disabled = true;
    var thinkingEl = addMessage('thinking', 'thinking\u2026');

    fetch('/api/query/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        message: text,
        graphSummary: graphSummary,
        history: history.slice(-12)
      })
    })
    .then(function(r) { return r.json(); })
    .then(function(data) {
      thinkingEl.remove();
      if (data.ok && data.reply) {
        addMessage('assistant', data.reply);
        history.push({ role: 'user', content: text });
        history.push({ role: 'assistant', content: data.reply });
      } else {
        addMessage('system', 'error: ' + (data.error || 'no response'));
      }
    })
    .catch(function() {
      thinkingEl.remove();
      addMessage('system', 'connection error \u2014 try again.');
    })
    .finally(function() {
      working = false;
      inputEl.disabled = false;
      sendBtn.disabled = false;
      inputEl.focus();
    });
  }

  // ── Auto-resize textarea ─────────────────────────────────────
  function autoResize() {
    inputEl.style.height = 'auto';
    inputEl.style.height = Math.min(inputEl.scrollHeight, 120) + 'px';
  }

  inputEl.addEventListener('input', autoResize);
  inputEl.addEventListener('keydown', function(e) {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); send(); }
  });
  sendBtn.addEventListener('click', send);
})();
</script>
</body>
</html>
