# A(DAI) Knowledge Graph — Source Registry
# Exported from Notion SOURCES doc, 2026-04-03
# ~70 sources across 9 groups, 5 validation tiers
# Developer reference for building ingestion connectors

metadata:
  version: "2026-04-03"
  source_doc: "https://www.notion.so/3377b5c8702081459238e2171499f5af"
  interoperability_standard: "Linked Art 1.0 (JSON-LD serialization of CIDOC-CRM)"
  reconciliation_key: "Wikidata QID"
  total_sources: 70

selection_principles:
  plurality_over_comprehensiveness: "128 artists across 25 countries; sources at least as diverse"
  layered_verification: "Every entity confirmable from at least two sources at different tiers"
  relationship_density: "Prefer sources that give edges (Are.na channels, exhibition records, GitHub graphs, co-authorship), not just isolated nodes"
  temporal_coverage: "Pioneers (1950s–1980s) through Integration (2016–present)"
  anti_monoculture: "No single source type exceeds 30% of total ingested nodes"

tiers:
  1:
    label: "Linked Open Data"
    sources: "Wikidata, Getty, Europeana, Rhizome ArtBase LOD, NFDI4Culture, Rijksmuseum"
    validation: "Machine-readable provenance, institutional editorial process, versioned"
    merge: "confidence: high — auto-merge after dedup"
  2:
    label: "Institutional databases"
    sources: "MoMA, Met, AIC, Tate, ZKM, ADA, SIGGRAPH, ISEA, museum APIs"
    validation: "Curated by institutional staff, structured metadata, verifiable"
    merge: "confidence: high for artwork/exhibition facts; medium for interpretive claims"
  3:
    label: "Platform-verified"
    sources: "fxhash, Art Blocks, SuperRare, Sedition, e-flux, Artsy, CAN"
    validation: "Platform-level verification, structured data, but commercial incentives"
    merge: "confidence: medium — human review before merge"
  4:
    label: "Community-curated"
    sources: "Are.na, GitHub, OpenProcessing, Mastodon, Monoskop, ARTLINKART"
    validation: "Practitioner-generated, high signal but no editorial gate"
    merge: "confidence: medium — require cross-reference against Tier 1–2"
  5:
    label: "Social/ephemeral"
    sources: "BlueSky, X/Twitter, Discord, YouTube comments"
    validation: "Real-time signal, lowest verification, highest noise"
    merge: "confidence: low — signals only, never auto-merged"

ingestion_phases:
  1:
    label: "Easiest wins"
    description: "GitHub datasets — download CSVs, parse, load. Get initial nodes + Wikidata QIDs."
  2:
    label: "Core APIs"
    description: "Wikidata SPARQL + Met/AIC REST APIs — enrich Phase 1 nodes, add edges, reconcile via QID."
  3:
    label: "Specialized APIs"
    description: "Art Blocks/fxhash (on-chain), Getty (disambiguation), Europeana (European breadth)."
  4:
    label: "Archives"
    description: "Rhizome ArtBase SPARQL, Rijksmuseum OAI-PMH, V&A API."
  5:
    label: "Scrape sources"
    description: "e-flux, CAN, Are.na, ARTLINKART, Ars Electronica — highest effort, manual curation for hardest."

