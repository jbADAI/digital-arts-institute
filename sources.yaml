sources:

  # ── Group 1: Foundation layer (Linked Open Data + APIs) ──────

  - name: "Wikipedia / Wikidata"
    group: foundation_lod
    tier: 1
    priority: high
    ingestion_phase: 2
    description: "Base knowledge, canonical practitioners, structured linked data. 97M+ items. WikiProject Visual Arts actively ingesting museum data."
    access:
      method: sparql
      endpoint: "https://query.wikidata.org/sparql"
      format: json-ld
      auth: null
      recipe: |
        # SPARQL query for digital artists with structured data
        SELECT ?item ?itemLabel ?ulan ?moma WHERE {
          ?item wdt:P31 wd:Q5 .          # human
          ?item wdt:P106 wd:Q483501 .     # occupation: artist
          OPTIONAL { ?item wdt:P245 ?ulan }  # Getty ULAN
          OPTIONAL { ?item wdt:P7669 ?moma } # MoMA artist ID
          SERVICE wikibase:label { bd:serviceParam wikibase:language "en" }
        } LIMIT 1000
    record_count: "97M+"
    reconciliation_ids: [wikidata_qid, getty_ulan, moma_id, aat]
    traditions_covered: [all]
    notes: "Universal entity reconciliation hub — QID links Getty ULAN, MoMA IDs, AAT concepts. Start here."

  - name: "Getty Vocabularies (ULAN, AAT, TGN)"
    group: foundation_lod
    tier: 1
    priority: high
    ingestion_phase: 3
    description: "650K+ names (ULAN), 57K concepts (AAT) as LOD. Disambiguation layer."
    access:
      method: sparql
      endpoint: "https://vocab.getty.edu/sparql"
      format: [n-triples, json-ld, turtle]
      auth: null
      recipe: |
        # Query ULAN for artist by name
        PREFIX gvp: <http://vocab.getty.edu/ontology#>
        SELECT ?subject ?name WHERE {
          ?subject a gvp:PersonConcept ;
                   gvp:prefLabelGVP/xl:literalForm ?name .
          FILTER(CONTAINS(LCASE(?name), "casey reas"))
        }
    record_count: "707K+"
    reconciliation_ids: [getty_ulan, aat, tgn]
    traditions_covered: [all]
    notes: "XML/relational downloads retiring end 2025 — LOD (N-Triples, JSON-LD, Turtle) is the only future-proof path."

  - name: "Europeana"
