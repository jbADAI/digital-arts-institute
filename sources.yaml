      format: json
      auth: api_key
      recipe: |
        # Register for API key at https://pro.europeana.eu/page/get-api
        # Search endpoint:
        curl "https://api.europeana.eu/record/v2/search.json?query=digital+art&wskey=YOUR_KEY"
    record_count: "60M+"
    reconciliation_ids: [europeana_id]
    traditions_covered: [immersive_spatial, video_electronic, net_art]
    notes: "REST APIs, LOD under CC0. API key registration migrated May 2025."

